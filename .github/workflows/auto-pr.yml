name: Auto Create PR with AI Description

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    if: github.actor == 'ikrystian'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COUNT=$(gh pr list --head "${{ github.ref_name }}" --base main --state open --json number --jq 'length')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Open PRs for ${{ github.ref_name }} -> main: $COUNT"

      - name: Get git diff
        if: steps.existing.outputs.count == '0'
        run: |
          git fetch origin main
          git diff origin/main...HEAD --stat --unified=3 | head -200 > /tmp/diff.txt
          cat /tmp/diff.txt

      - name: Generate PR title and body with DeepSeek via OpenRouter
        if: steps.existing.outputs.count == '0'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          DIFF=$(cat /tmp/diff.txt)
          BRANCH="${{ github.ref_name }}"

          PAYLOAD=$(jq -n \
            --arg diff "$DIFF" \
            --arg branch "$BRANCH" \
            '{
              model: "deepseek/deepseek-v4-flash",
              max_tokens: 1024,
              messages: [{
                role: "user",
                content: ("You are a helpful assistant that writes pull request descriptions.\nBranch name: " + $branch + "\n\nGit diff:\n" + $diff + "\n\nRespond ONLY with a JSON object (no markdown, no backticks, no extra text):\n{\"title\": \"<short PR title>\", \"body\": \"<markdown PR description with: summary, changes, notes>\"}")
              }]
            }')

          RESPONSE=$(curl -s https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: ${{ github.repository }}" \
            -d "$PAYLOAD")

          echo "=== Raw API response ==="
          echo "$RESPONSE"

          AI_JSON=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          # Parse title/body, with fallbacks so the PR is still created if the AI call fails
          echo "$AI_JSON" | jq -e -r '.title' > /tmp/pr_title.txt 2>/dev/null || echo "$BRANCH" > /tmp/pr_title.txt
          echo "$AI_JSON" | jq -e -r '.body'  > /tmp/pr_body.txt  2>/dev/null || printf 'Automated PR for `%s`.\n' "$BRANCH" > /tmp/pr_body.txt

          # Guard against empty/null output
          [ -s /tmp/pr_title.txt ] && [ "$(cat /tmp/pr_title.txt)" != "null" ] || echo "$BRANCH" > /tmp/pr_title.txt
          [ -s /tmp/pr_body.txt ]  && [ "$(cat /tmp/pr_body.txt)"  != "null" ] || printf 'Automated PR for `%s`.\n' "$BRANCH" > /tmp/pr_body.txt

      - name: Create Pull Request
        if: steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ github.ref_name }}" \
            --title "$(cat /tmp/pr_title.txt)" \
            --body-file /tmp/pr_body.txt)
          echo "Created: $PR_URL"

          # Ensure labels exist, then apply them (non-fatal so labeling never blocks PR creation)
          gh label create automated-pr --color 0e8a16 2>/dev/null || true
          gh label create ai-generated --color 1d76db 2>/dev/null || true
          gh pr edit "$PR_URL" --add-label automated-pr --add-label ai-generated || true
