name: Auto Create PR with AI Description

on:
  push:
    branches:
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to create PR from (must already exist)'
        required: true
        default: 'feature/debug-test'
      debug:
        description: 'Enable verbose debug output'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    environment: dev
    if: github.actor == 'ikrystian' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for existing PR
        id: existing
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          PR_JSON=$(gh pr list --head "$BRANCH" --base main --state open --json number,body)
          COUNT=$(echo "$PR_JSON" | jq 'length')
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')
          PR_BODY=$(echo "$PR_JSON" | jq -r '.[0].body // empty')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Open PRs for $BRANCH -> main: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "Existing PR number: $PR_NUMBER"
          fi
          # Save existing body to a file (might be empty)
          printf '%s' "$PR_BODY" > /tmp/existing_pr_body.txt

      - name: Fetch task details from TeamFlow
        id: task
        env:
          APP_URL: ${{ secrets.APP_URL }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"

          # Extract task key from branch name.
          # Branch format: feature/<key>-<slug>  e.g. feature/ne-10-fix-login
          # Key is everything between the first '/' and the part after the second segment that
          # matches the pattern LETTERS-DIGITS (e.g. ne-10).
          RAW_KEY=$(echo "$BRANCH" | sed 's|^[^/]*/||' | grep -oP '^[a-zA-Z]+-\d+' || true)
          TASK_KEY=$(echo "$RAW_KEY" | tr '[:lower:]' '[:upper:]')

          echo "Extracted task key: '$TASK_KEY' from branch: '$BRANCH'"
          echo "task_key=$TASK_KEY" >> "$GITHUB_OUTPUT"

          TASK_TITLE=""
          TASK_DESCRIPTION=""

          if [ -n "$TASK_KEY" ] && [ -n "$APP_URL" ]; then
            # Query the internal API by task key
            RESPONSE=$(curl -sf \
              -H "Authorization: Bearer ${API_TOKEN}" \
              -H "Content-Type: application/json" \
              "${APP_URL}/api/system/tasks/${TASK_KEY}" 2>/dev/null || true)

            if [ -n "$RESPONSE" ]; then
              TASK_TITLE=$(echo "$RESPONSE" | jq -r '.task.title // empty' 2>/dev/null || true)
              TASK_DESCRIPTION=$(echo "$RESPONSE" | jq -r '.task.description // empty' 2>/dev/null || true)
              echo "Fetched task: '$TASK_TITLE'"
            else
              echo "Could not fetch task from API (APP_URL or API_TOKEN may not be set). Continuing without task details."
            fi
          fi

          echo "task_title=$TASK_TITLE" >> "$GITHUB_OUTPUT"

          # Build PR title: [KEY] - Task title  (fallback: branch name)
          if [ -n "$TASK_KEY" ] && [ -n "$TASK_TITLE" ]; then
            PR_TITLE="[$TASK_KEY] - $TASK_TITLE"
          elif [ -n "$TASK_KEY" ]; then
            PR_TITLE="[$TASK_KEY] - $BRANCH"
          else
            PR_TITLE="$BRANCH"
          fi

          echo "$PR_TITLE" > /tmp/pr_title.txt
          echo "PR title: $PR_TITLE"

          # Persist task description for the AI prompt
          printf '%s' "$TASK_DESCRIPTION" > /tmp/task_description.txt

      - name: Get git diff
        run: |
          git fetch origin main
          git diff origin/main...HEAD --stat --unified=3 | head -300 > /tmp/diff.txt
          cat /tmp/diff.txt

      - name: Generate PR body with DeepSeek via OpenRouter
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          DIFF=$(cat /tmp/diff.txt)
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          TASK_KEY="${{ steps.task.outputs.task_key }}"
          TASK_TITLE="${{ steps.task.outputs.task_title }}"
          TASK_DESC=$(cat /tmp/task_description.txt 2>/dev/null || true)
          EXISTING_BODY=$(cat /tmp/existing_pr_body.txt 2>/dev/null || true)

          # --- Debug: API key presence ---
          if [ -z "$OPENROUTER_API_KEY" ]; then
            echo "ERROR: OPENROUTER_API_KEY secret is empty or not set!"
          else
            echo "OK: OPENROUTER_API_KEY is set (length: ${#OPENROUTER_API_KEY})"
          fi

          # Build context block for the AI
          TASK_CONTEXT=""
          if [ -n "$TASK_TITLE" ]; then
            TASK_CONTEXT="Task: [$TASK_KEY] $TASK_TITLE"
            if [ -n "$TASK_DESC" ]; then
              TASK_CONTEXT="$TASK_CONTEXT\nTask description: $TASK_DESC"
            fi
          fi

          PAYLOAD=$(jq -n \
            --arg diff "$DIFF" \
            --arg branch "$BRANCH" \
            --arg task_context "$TASK_CONTEXT" \
            --arg existing_body "$EXISTING_BODY" \
            '{
              model: "deepseek/deepseek-chat",
              max_tokens: 1500,
              messages: [{
                role: "user",
                content: ("You are a helpful assistant that writes or updates pull request descriptions.\nBranch: " + $branch + "\n" + (if $task_context != "" then $task_context + "\n" else "" end) + (if $existing_body != "" then "\nExisting PR Description:\n" + $existing_body + "\n" else "" end) + "\nGit diff:\n" + $diff + "\n\nInstructions: If an existing PR description is provided, preserve its general structure and content (especially any manually added notes, check-lists, or custom text), but update or append to it to incorporate the new changes shown in the git diff. If no existing PR description is provided, write a clear, concise PR description in Markdown with sections: ## Summary, ## Changes, ## Notes.\nRespond with ONLY the markdown body text, no JSON wrapper, no code fences. IN POLISH LANGUAGE")
              }]
            }')

          echo "=== Payload (model + first 300 chars of content) ==="
          echo "$PAYLOAD" | jq '{model, max_tokens, preview: (.messages[0].content | .[0:300])}'

          # Capture HTTP status alongside body
          HTTP_STATUS=$(curl -s -o /tmp/openrouter_response.json -w "%{http_code}" \
            https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${OPENROUTER_API_KEY}" \
            -H "Content-Type: application/json" \
            -H "HTTP-Referer: https://github.com/${{ github.repository }}" \
            -H "X-Title: ${{ github.repository }}" \
            -d "$PAYLOAD")

          echo "=== HTTP status: $HTTP_STATUS ==="
          RESPONSE=$(cat /tmp/openrouter_response.json)
          echo "=== Raw API response ==="
          echo "$RESPONSE"

          # Surface error details if present
          API_ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty' 2>/dev/null || true)
          if [ -n "$API_ERROR" ]; then
            echo "ERROR from OpenRouter: $API_ERROR"
            echo "Error code: $(echo "$RESPONSE" | jq -r '.error.code // empty')"
          fi

          AI_BODY=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty' 2>/dev/null || true)

          # Fallback if AI call failed
          if [ -z "$AI_BODY" ] || [ "$AI_BODY" = "null" ]; then
            echo "WARNING: AI body is empty — using fallback description."
            printf 'Automated PR for `%s`.\n' "$BRANCH" > /tmp/pr_body.txt
          else
            printf '%s' "$AI_BODY" > /tmp/pr_body.txt
          fi

          echo "=== PR body preview ==="
          head -20 /tmp/pr_body.txt

      - name: Create Pull Request
        if: steps.existing.outputs.count == '0'
        env:
          # Prefer PAT_TOKEN (needed to create PRs when the default GITHUB_TOKEN is restricted).
          # Falls back to github.token so the step never crashes with "GH_TOKEN not set"
          # even if PAT_TOKEN secret hasn't been added yet (PR creation will still fail at
          # the GraphQL level if the repo setting is also disabled).
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "${{ github.event.inputs.branch || github.ref_name }}" \
            --title "$(cat /tmp/pr_title.txt)" \
            --body-file /tmp/pr_body.txt)
          echo "Created: $PR_URL"

      - name: Update Pull Request
        if: steps.existing.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
        run: |
          PR_NUMBER="${{ steps.existing.outputs.number }}"
          echo "Updating PR #$PR_NUMBER with new description..."
          gh pr edit "$PR_NUMBER" --body-file /tmp/pr_body.txt
